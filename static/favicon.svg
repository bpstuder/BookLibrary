<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background rounded rect -->
  <rect width="64" height="64" rx="12" fill="#18181f"/>
  
  <!-- Book stack: 3 books -->
  <!-- Bottom book (blue-ish) -->
  <rect x="10" y="42" width="44" height="9" rx="3" fill="#3b82f6"/>
  <rect x="10" y="42" width="5" height="9" rx="2" fill="#2563eb"/>
  
  <!-- Middle book (purple) -->
  <rect x="10" y="31" width="44" height="9" rx="3" fill="#7b61ff"/>
  <rect x="10" y="31" width="5" height="9" rx="2" fill="#6044ee"/>
  
  <!-- Top book (accent) -->
  <rect x="10" y="20" width="44" height="9" rx="3" fill="#a78bfa"/>
  <rect x="10" y="20" width="5" height="9" rx="2" fill="#7b61ff"/>
  
  <!-- Small star/sparkle top-right -->
  <circle cx="50" cy="13" r="3" fill="#a78bfa" opacity="0.9"/>
  <circle cx="56" cy="10" r="2" fill="#7b61ff" opacity="0.7"/>
  <circle cx="52" cy="7"  r="1.5" fill="#a78bfa" opacity="0.5"/>
</svg>
