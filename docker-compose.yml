services:
  app:
    build: .
    image: manga-collection:latest   # tag explicite — force rebuild si Dockerfile change
    container_name: manga-collection
    restart: unless-stopped
    # Run as the host user to match file ownership on volumes.
    # Set PUID/PGID in .env to match `id -u` / `id -g` on the host.
    # Default: 1000:1000 (standard first user on most Linux/NAS systems).
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      # Your manga/comics/ebooks folder — mounted read-only for safety
      - ${LIBRARY_PATH:-./library}:/app/library:ro
      # Persistent DB, covers, config — written as PUID:PGID
      - manga_data:/app/data
    environment:
      LIBRARY_PATH: /app/library
      COMICVINE_API_KEY: ${COMICVINE_API_KEY:-}
      HARDCOVER_API_KEY: ${HARDCOVER_API_KEY:-}
      SCAN_INCLUDE: ${SCAN_INCLUDE:-}
      SCAN_EXCLUDE: ${SCAN_EXCLUDE:-}
      PORT: 8000
      DEBUG: ${DEBUG:-false}
    healthcheck:
      test: ["CMD", "curl", "-f", "--silent", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  manga_data:
    driver: local
