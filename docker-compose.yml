services:
  app:
    build: .
    container_name: manga-collection
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      # Your manga/comics/ebooks folder — mounted read-only for safety
      - ${LIBRARY_PATH:-./library}:/app/library:ro
      # Persistent DB, covers, config — written as PUID:PGID
      - manga_data:/app/data
    environment:
      LIBRARY_PATH: /app/library
      COMICVINE_API_KEY: ${COMICVINE_API_KEY:-}
      HARDCOVER_API_KEY: ${HARDCOVER_API_KEY:-}
      PORT: 8000
      DEBUG: ${DEBUG:-false}
      # UID/GID of the host user who owns the library and data directories.
      # Match these to the output of `id -u` and `id -g` on the host.
      # Default: 1000:1000 (standard first user on most Linux systems)
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    healthcheck:
      test: ["CMD", "curl", "-f", "--head", "--silent", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  manga_data:
    driver: local
